name: CLI CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install flake8

      - name: Lint
        run: flake8 insighta/ --max-line-length=120 --exclude=__pycache__

      - name: Test CLI loads
        run: insighta --help

      - name: Test auth commands load
        run: |
          insighta login --help
          insighta logout --help
          insighta whoami --help

      - name: Test profile commands load
        run: |
          insighta profiles --help
          insighta profiles list --help
          insighta profiles get --help
          insighta profiles search --help
          insighta profiles create --help
          insighta profiles export --help
